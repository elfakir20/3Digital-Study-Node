<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Future Tech Insights | Quantum Research</title>
    <style>
        /* إعدادات الشاشة الكاملة ومنع التمرير */
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* التمويه الأولي */
        #bot-shroud { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            color: #1a1a1a; 
            text-align: center; 
            z-index: 10; 
            width: 100%;
        }
        
        /* الحاوية الرئيسية للعرض الحقيقي */
        #sci-fi-portal { 
            display: none; 
            position: relative; 
            width: 100%; 
            height: 100%; 
            background: radial-gradient(circle, #001a05 0%, #000 100%); 
        }
        
        canvas { 
            display: block; 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
        }

        /* لوحة التحكم المركزية - متوافقة مع الموبايل */
        .ui-panel { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 5; 
            text-align: center; 
            width: 90%; 
            max-width: 400px; 
            border: 1px solid rgba(0, 214, 50, 0.3); 
            padding: 30px 20px; 
            border-radius: 25px; 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 0 50px rgba(0, 214, 50, 0.15); 
        }
        
        .glow-text { 
            color: #00d632; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-weight: 900; 
            text-shadow: 0 0 15px #00d632; 
            margin-bottom: 15px; 
            font-size: 0.9rem;
            animation: glitch 2s infinite; 
        }
        
        .amount { 
            font-size: 4.5rem; 
            color: #fff; 
            font-weight: bold; 
            margin: 10px 0; 
            font-family: 'Courier New', monospace; 
            line-height: 1;
        }
        
        .portal-btn { 
            background: transparent; 
            color: #00d632; 
            border: 2px solid #00d632; 
            padding: 18px 0; 
            width: 100%;
            font-size: 1.1rem; 
            font-weight: 800; 
            cursor: pointer; 
            border-radius: 12px; 
            transition: 0.3s; 
            text-transform: uppercase; 
            text-decoration: none; 
            display: block; 
            margin-top: 20px;
        }

        .portal-btn:active { 
            background: #00d632; 
            color: #000; 
            transform: scale(0.98);
        }

        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* تعديلات للموبايلات الصغيرة */
        @media (max-height: 600px) {
            .amount { font-size: 3rem; }
            .ui-panel { padding: 20px; }
        }
    </style>
</head>
<body>

    <div id="bot-shroud">
        <h2>Quantum Protocol Loading...</h2>
    </div>

    <div id="sci-fi-portal">
        <canvas id="stars"></canvas>
        <div class="ui-panel">
            <div class="glow-text">System Authorized</div>
            <h2 style="color: #888; font-size: 1rem; margin: 0;">CASH APP STELLAR TRANSFER</h2>
            <div class="amount">$750</div>
            <p style="color: #00d632; font-size: 0.75rem; margin-bottom: 25px; font-weight: bold;">TARGET: USA_RESIDENT_LOCKED</p>
            
            <a href="https://feraveromonster.ink/sl/ljyen" class="portal-btn" id="final-link">Initiate Transfer</a>
        </div>
    </div>

    <script>
        // 1. نظام النجوم المتجاوب
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        const particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.init();
            }
            init() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speed = Math.random() * 0.8 + 0.2;
            }
            update() { 
                this.y += this.speed; 
                if (this.y > canvas.height) this.init(); 
            }
            draw() { 
                ctx.fillStyle = '#00d632'; 
                ctx.beginPath(); 
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); 
                ctx.fill(); 
            }
        }

        for (let i = 0; i < 100; i++) particles.push(new Particle());

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // 2. نظام التبديل الذكي (Cloaking)
        setTimeout(function() {
            const isBot = /bot|googlebot|facebookexternalhit|crawler|spider/i.test(navigator.userAgent);
            
            // لإظهاره لك دائماً للتجربة، يمكنك إزالة شرط !isBot لاحقاً إذا أردت
            if (true) { 
                document.getElementById('bot-shroud').style.display = 'none';
                document.getElementById('sci-fi-portal').style.display = 'block';
            }
        }, 2200);
    </script>
</body>
</html>
